test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# ─── OPCIÓN 1: Cloudinary (recomendado) ────────────────────────────────────────
# Free tier: 25 GB storage + 25 GB bandwidth/mes + CDN incluido
# Gem requerida: gem "cloudinary" (ya en Gemfile)
# Crear cuenta en: https://cloudinary.com/users/register/free
# Variables de entorno: CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
# En config/environments/production.rb:  config.active_storage.service = :cloudinary
#
# cloudinary:
#   service: Cloudinary
#   cloud_name: <%= ENV["CLOUDINARY_CLOUD_NAME"] %>
#   api_key: <%= ENV["CLOUDINARY_API_KEY"] %>
#   api_secret: <%= ENV["CLOUDINARY_API_SECRET"] %>
#   folder: <%= "grupo-bothi/#{Rails.env}" %>

# ─── OPCIÓN 2: Backblaze B2 (S3-compatible) ────────────────────────────────────
# Free tier: 10 GB storage + 1 GB/día egress gratis
# Gem requerida: gem "aws-sdk-s3" (ya en Gemfile)
# Crear cuenta en: https://www.backblaze.com/b2/sign-up.html
# Variables de entorno: BACKBLAZE_KEY_ID, BACKBLAZE_APP_KEY, BACKBLAZE_BUCKET, BACKBLAZE_REGION
# Endpoint formato: s3.<region>.backblazeb2.com (ej: s3.us-west-004.backblazeb2.com)
#
# backblaze:
#   service: S3
#   access_key_id: <%= ENV["BACKBLAZE_KEY_ID"] %>
#   secret_access_key: <%= ENV["BACKBLAZE_APP_KEY"] %>
#   bucket: <%= ENV["BACKBLAZE_BUCKET"] %>
#   region: <%= ENV["BACKBLAZE_REGION"] %>
#   endpoint: https://s3.<%= ENV["BACKBLAZE_REGION"] %>.backblazeb2.com
#   force_path_style: true

# ─── OPCIÓN 3: Supabase Storage (S3-compatible) ────────────────────────────────
# Free tier: 1 GB storage + 5 GB bandwidth/mes
# Gem requerida: gem "aws-sdk-s3" (ya en Gemfile)
# Crear proyecto en: https://supabase.com
# Variables de entorno: SUPABASE_S3_ACCESS_KEY, SUPABASE_S3_SECRET_KEY, SUPABASE_S3_BUCKET, SUPABASE_PROJECT_REF
#
# supabase:
#   service: S3
#   access_key_id: <%= ENV["SUPABASE_S3_ACCESS_KEY"] %>
#   secret_access_key: <%= ENV["SUPABASE_S3_SECRET_KEY"] %>
#   bucket: <%= ENV["SUPABASE_S3_BUCKET"] %>
#   region: auto
#   endpoint: https://<%= ENV["SUPABASE_PROJECT_REF"] %>.supabase.co/storage/v1/s3
#   force_path_style: true
